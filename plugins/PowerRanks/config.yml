general:
  language: es
  autosave-files-interval: 600
  playtime-update-interval: 60
  case-sensitive-permissions: false
  disable-op: false
bungeecord:
  enabled: false
  server-name: Global
  uuid: e6e3f10f-c771-42cf-9576-7c132aa64840
storage:
  type: YAML
  mysql:
    host: 127.0.0.1
    port: 3306
    database: powerranks
    username: username
    password: password
    ssl: false
    verbose: true
chat:
  enabled: true
  format: '&a[world]&r [usertag] [prefix] [player] [suffix]&r: [msg]'
tablist_modification:
  enabled: true
  format: '&a[world]&r [usertag] [prefix] [player] [suffix]'
nametagedit:
  prefix: '[usertag] [prefix]'
  suffix: '[suffix]'
signs:
  enabled: true
  title_format: '&0[&b%plugin_name%&0]'
plugin_hook:
  vault_economy: true
  vault_permissions: true
  vault_permissions_experimental: true
  placeholderapi: true
  deluxetags: false
  nametagedit: true
placeholderapi:
  inject_powerranks_color: false
  multi_rank_separator: ' '
announcements:
  rankup:
    enabled: true
    format: '[powerranks_prefix] &6[player]''s ha alcanzado el rango [rank]'
  promote:
    enabled: true
    format: '[powerranks_prefix] &6[player] ha sido ascendido a [rank]'
  demote:
    enabled: true
    format: '[powerranks_prefix] &6[player] ha sido degradado a [rank]'
updates:
  enable_update_checking: false
  automatic_download_updates: false
  automatic_update_config_files: false
addon_manager:
  accepted_terms: false
rankup:
  buy_command:
    enabled: true
    command: say %playername% just bought the rank %rankname%
version: 1.10.92
